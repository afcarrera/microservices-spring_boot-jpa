server:
  port: 9900

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:9200/eureka/

spring:
  application:
    name: gateway-services
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
      routes:
        - id: customer-services
          uri: http://customer-services
          predicates:
            - Path=/**
        - id: account-services
          uri: http://account-services
          predicates:
            - Path=/**